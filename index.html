<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Image Gallery</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎲 Random Image Gallery</h1>
            <p>Each visit shows a random image from the API</p>
        </header>

        <main>
            <div class="image-card">
                <div id="loading" class="loading">Loading random image...</div>
                <img id="random-image" src="" alt="Random Image" style="display: none;">
                <div class="image-info">
                    <p id="image-id">ID: -</p>
                    <p id="image-author">Author: -</p>
                    <p id="image-dimensions">Dimensions: -</p>
                </div>
            </div>

            <button id="new-image-btn" class="btn">🔄 Get New Random Image</button>
        </main>

        <footer>
            <p>API Endpoint: <code>/api/images/random</code> — returns random image JSON</p>
            <p>All Images API: <code>/api/images.json</code> — returns all available images</p>
        </footer>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
